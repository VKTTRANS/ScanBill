<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบและสแกนเอกสารด้วย AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a0ca3;
            --secondary: #4cc9f0;
            --bg-color: #f8f9fc;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --border-light: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 25px rgba(67, 97, 238, 0.1);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px 15px; 
            color: var(--text-main); 
        }

        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px 25px; 
            border-radius: 24px; 
            box-shadow: var(--shadow-md); 
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 { 
            color: var(--primary); 
            margin: 0 0 8px 0; 
            font-size: 26px;
            font-weight: 600;
        }

        .header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 15px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            font-weight: 500; 
            color: var(--text-main); 
            display: block; 
            margin-bottom: 10px; 
            font-size: 15px;
        }

        #dataSelect {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .select2-ready {
            opacity: 1 !important;
        }

        .select2-container--default .select2-selection--single {
            height: 56px;
            border-radius: 14px;
            border: 2px solid var(--border-light);
            background-color: #fcfcfc;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .select2-container--default.select2-container--open .select2-selection--single {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            color: var(--text-main);
            padding-left: 16px;
            line-height: normal;
        }

        .select2-container--default .select2-selection--single .select2-selection__placeholder {
            color: #999;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 54px;
            right: 12px;
        }

        .select2-dropdown {
            font-family: 'Kanit', sans-serif;
            border: 2px solid var(--primary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .select2-search__field {
            font-family: 'Kanit', sans-serif;
            border-radius: 8px !important;
            padding: 10px !important;
        }

        .select2-results__option {
            padding: 12px 16px;
            font-size: 15px;
        }

        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: var(--primary);
        }

        .data-section { 
            margin-bottom: 30px; 
            border: 1px solid var(--border-light); 
            padding: 20px; 
            border-radius: 16px; 
            background-color: #fafbfc; 
            animation: fadeIn 0.4s ease-out;
        }
        
        .data-section h3 {
            margin: 0 0 15px 0; 
            color: var(--text-main); 
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        @media (max-width: 600px) { 
            .info-grid { grid-template-columns: 1fr; } 
            .container { padding: 25px 20px; border-radius: 20px;}
        }

        .info-item label { 
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .info-item span { 
            display: block; 
            padding: 12px 15px; 
            background: #fff; 
            border: 1px solid var(--border-light); 
            border-radius: 10px; 
            font-size: 15px; 
            word-break: break-word; 
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .upload-container {
            border: 2px dashed #bcccff; 
            padding: 25px 20px; 
            border-radius: 16px; 
            background-color: #f4f7ff; 
            margin-bottom: 25px; 
            text-align: center;
        }
        
        .upload-header {
            margin: 0 0 15px 0; 
            color: var(--primary); 
            font-weight: 500;
            font-size: 16px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            background-color: white;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .action-btn:hover {
            background-color: var(--primary);
            color: white;
        }
        
        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn svg {
            width: 28px;
            height: 28px;
        }

        input[type="file"] { display: none; }
        
        #preview { 
            max-width: 100%; 
            max-height: 250px; 
            margin-top: 20px; 
            border-radius: 12px; 
            display: none; 
            box-shadow: var(--shadow-md);
            object-fit: contain;
            animation: fadeIn 0.4s ease-out;
            margin-left: auto;
            margin-right: auto;
        }

        button.submit-btn { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 18px; 
            font-family: 'Kanit', sans-serif;
            border-radius: 14px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 500; 
            transition: all 0.3s; 
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button.submit-btn:hover { 
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
            transform: translateY(-2px);
        }

        button.submit-btn:active {
            transform: translateY(1px);
        }

        button.submit-btn:disabled { 
            background: #cbd5e1; 
            box-shadow: none;
            cursor: not-allowed; 
            transform: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ระบบสแกนเอกสารอัจฉริยะ</h2>
        <p>ตรวจสอบความถูกต้องของเอกสารด้วย Google AI</p>
    </div>
    
    <div class="form-group">
        <label for="dataSelect">1. พิมพ์ค้นหา หรือ เลือกระเบียนข้อมูล</label>
        <select id="dataSelect" disabled>
            <option value="">กำลังโหลดข้อมูล...</option>
        </select>
    </div>

    <div class="data-section">
        <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            ข้อมูลอ้างอิง
        </h3>
        <div id="infoDisplay" class="info-grid">
            <div class="info-item" style="grid-column: 1 / -1; text-align: center; padding: 20px 0;">
                <span style="color:#a0aec0; border: none; background: transparent; box-shadow: none;">กรุณาเลือกรายการด้านบนเพื่อแสดงรายละเอียด</span>
            </div>
        </div>
    </div>

    <div class="upload-container">
        <p class="upload-header">2. นำเข้าเอกสารเพื่อตรวจสอบ</p>
        
        <div class="action-buttons">
            <div class="action-btn" onclick="document.getElementById('cameraInput').click()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                ถ่ายรูปใหม่
            </div>
            
            <div class="action-btn" onclick="document.getElementById('galleryInput').click()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                อัปโหลดรูปภาพ
            </div>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="previewFile(this)">
        <input type="file" id="galleryInput" accept="image/*" onchange="previewFile(this)">
        
        <img id="preview" src="" alt="ตัวอย่างรูปถ่าย">
    </div>

    <button id="submitBtn" class="submit-btn" onclick="processDocument()" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        เริ่มสแกนตรวจสอบ
    </button>
</div>

<script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNJyTVwNaGcfKdF9OTUiXoXxeUJDMjj4t9BAyZfIAedibQPni-xHsL41TACbbOGmL5Xw/exec";
    const VISION_API_KEY = "AIzaSyAUWjUZ43ADkKVCKpefv-d8Fcf20RCCtxw";
    let globalData = [];
    let currentBase64 = "";

    window.onload = function() {
        Swal.fire({
            title: 'กำลังเชื่อมต่อระบบ...',
            text: 'กำลังดึงฐานข้อมูลบริษัท กรุณารอสักครู่',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading()
            }
        });

        fetch(`${GAS_WEB_APP_URL}?action=getData&sheetName=Setting`)
        .then(response => response.json())
        .then(res => {
            if(res.status === "success") {
                globalData = res.data;
                const select = document.getElementById("dataSelect");
                select.innerHTML = '<option value="">-- พิมพ์ค้นหา หรือ เลือกบริษัท --</option>';
                
                globalData.forEach((item, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    const values = Object.values(item);
                    let displayText = values[0]; 
                    option.text = displayText ? displayText : `รายการที่ ${index + 1}`; 
                    select.appendChild(option);
                });

                $(document).ready(function() {
                    $('#dataSelect').prop('disabled', false); 
                    $('#dataSelect').select2({
                        placeholder: "-- พิมพ์ค้นหา หรือ เลือกบริษัท --",
                        allowClear: true,
                        width: '100%',
                        language: {
                            noResults: function() {
                                return "ไม่พบข้อมูลที่ค้นหา";
                            }
                        }
                    });

                    $('#dataSelect').addClass('select2-ready');

                    $('#dataSelect').on('change', function() {
                        displaySelectedData();
                    });
                    
                    Swal.close();
                });

            } else {
                Swal.fire('ข้อผิดพลาด!', 'ไม่สามารถดึงข้อมูลจาก Sheet ได้', 'error');
            }
        }).catch(err => {
            console.error(err);
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว',
                text: 'ไม่สามารถดึงฐานข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ต',
                confirmButtonColor: '#4361ee'
            });
        });
    };

    function displaySelectedData() {
        const selectedIndex = $('#dataSelect').val(); 
        const displayDiv = document.getElementById("infoDisplay");
        const submitBtn = document.getElementById("submitBtn");
        
        if(!selectedIndex || selectedIndex === "") {
            displayDiv.innerHTML = '<div class="info-item" style="grid-column: 1 / -1; text-align: center; padding: 20px 0;"><span style="color:#a0aec0; border: none; background: transparent; box-shadow: none;">กรุณาเลือกรายการด้านบนเพื่อแสดงรายละเอียด</span></div>';
            submitBtn.disabled = true;
            return;
        }

        const selectedItem = globalData[selectedIndex];
        displayDiv.innerHTML = "";
        
        for (const [key, value] of Object.entries(selectedItem)) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "info-item";
            itemDiv.innerHTML = `<label>${key}</label><span>${value || '-'}</span>`;
            displayDiv.appendChild(itemDiv);
        }
        
        if (currentBase64 !== "") {
            submitBtn.disabled = false;
        }
    }

    function previewFile(inputElement) {
        const file = inputElement.files[0];
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById("submitBtn");
        const selectedIndex = $('#dataSelect').val();
        
        if(inputElement.id === 'cameraInput') {
            document.getElementById('galleryInput').value = "";
        } else {
            document.getElementById('cameraInput').value = "";
        }

        if (file) {
            const reader = new FileReader();
            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = "block";
                currentBase64 = reader.result.split(',')[1];
                
                if (selectedIndex && selectedIndex !== "") {
                    submitBtn.disabled = false;
                }
            }
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            preview.style.display = "none";
            currentBase64 = "";
            submitBtn.disabled = true;
        }
    }

    async function processDocument() {
        const selectedIndex = $('#dataSelect').val();
        const submitBtn = document.getElementById("submitBtn");
        
        if (!currentBase64) {
            Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาถ่ายรูปหรืออัปโหลดเอกสารก่อนสแกน', confirmButtonColor: '#4361ee' });
            return;
        }
        if (!selectedIndex || selectedIndex === "") {
            Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาเลือกระเบียนข้อมูลที่ต้องการตรวจสอบก่อน', confirmButtonColor: '#4361ee' });
            return;
        }

        const selectedItem = globalData[selectedIndex];
        
        const taxIdToMatch = selectedItem["TaxID"] ? selectedItem["TaxID"].toString().replace(/\D/g,'') : "";
        const companyNameToMatch = selectedItem["CompanyName"] ? selectedItem["CompanyName"].toString() : "";
        const addressToMatch = selectedItem["Address"] ? selectedItem["Address"].toString() : "";
        
        submitBtn.disabled = true;
        
        Swal.fire({
            title: 'AI กำลังวิเคราะห์รูปภาพ...',
            html: 'กรุณารอสักครู่ ระบบกำลังตรวจสอบอย่างละเอียด',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading()
            }
        });

        const visionPayload = {
            requests: [
                {
                    image: { content: currentBase64 },
                    features: [{ type: "TEXT_DETECTION" }]
                }
            ]
        };

        try {
            const visionResponse = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(visionPayload)
            });

            const visionData = await visionResponse.json();
            
            if (visionData.responses[0].error) {
                Swal.fire('ข้อผิดพลาด AI', visionData.responses[0].error.message, 'error');
                submitBtn.disabled = false;
                return;
            }

            const detectedText = visionData.responses[0].fullTextAnnotation ? visionData.responses[0].fullTextAnnotation.text : "";
            
            // ตรวจหา TaxID ด้วยตัวเลขล้วน (บังคับตรงเป๊ะ 100%)
            const cleanDetectedTextNumbersOnly = detectedText.replace(/\D/g, '');

            // ตรวจหายอดเงินในบิล
            const moneyMatches = detectedText.match(/\b\d{1,3}(?:,\d{3})+(?:\.\d{2})?\b|\b\d+\.\d{2}\b/g);
            let maxAmount = 0;
            if (moneyMatches) {
                moneyMatches.forEach(m => {
                    const val = parseFloat(m.replace(/,/g, ''));
                    if (val > maxAmount) {
                        maxAmount = val;
                    }
                });
            }

            let amountWarningHtml = '';
            if (maxAmount >= 1070) {
                amountWarningHtml = `
                <div style="margin-top: 15px; background-color: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; border: 1px solid #ffeeba; text-align: left; font-size: 14px; line-height: 1.5;">
                    <strong style="font-size:15px; color:#d35400;">⚠️ ตรวจพบยอดเงินในบิล: ${maxAmount.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})} บาท</strong><br>
                    (ยอดรวมตั้งแต่ 1,070 บาทขึ้นไป)<br>
                    <span style="font-weight:600;">📌 ต้องออกใบหัก ณ ที่จ่าย (กรุณาตรวจสอบกับเจ้าของงานอีกครั้ง)</span>
                </div>`;
            }

            // ------------------------------------------------------------------
            // ลอจิกใหม่: Word-by-Word Matching (Fuzzy Match) สำหรับเช็คชื่อบริษัทและที่อยู่
            // ช่วยแก้ปัญหา AI อ่านสัญลักษณ์เพี้ยน (เช่น เลข 0 เป็นตัว O) ทำให้ระบบยังจำคำได้
            // ------------------------------------------------------------------
            function isFuzzyMatch(dbText, ocrText, threshold) {
                if (!dbText) return false;
                // ตัดสัญลักษณ์พิเศษออกหมด แล้วแยกเป็นคำๆ ด้วยช่องว่าง
                const cleanStr = dbText.toLowerCase().replace(/[^a-z0-9ก-๙]/g, ' ');
                const words = cleanStr.split(/\s+/).filter(w => w.length > 1); // เอาเฉพาะคำที่มีความยาว > 1
                
                // ถ้าฐานข้อมูลสั้นมากจนหั่นคำไม่ได้ ให้กลับไปใช้ระบบตรวจเป๊ะ 100%
                if (words.length === 0) {
                    const strictDb = dbText.toLowerCase().replace(/[^a-z0-9ก-๙]/g, '');
                    const strictOcr = ocrText.toLowerCase().replace(/[^a-z0-9ก-๙]/g, '');
                    return strictOcr.includes(strictDb);
                }
                
                const lowerOcr = ocrText.toLowerCase();
                let matchCount = 0;
                
                // นับว่าในบิลมีคำจากฐานข้อมูลกี่คำ
                words.forEach(w => {
                    if (lowerOcr.includes(w)) {
                        matchCount++;
                    }
                });
                
                // ถ้ายอดเปอร์เซ็นต์คำที่เจอ ผ่านเกณฑ์ที่กำหนดไว้ ถือว่าถูกต้อง!
                return (matchCount / words.length) >= threshold;
            }

            let isMatch = true;
            let foundTaxId = false;
            let foundCompanyName = false;
            let foundAddress = false;

            // 1. เช็ค TaxID (ต้องเจอเป๊ะ 100%)
            if (taxIdToMatch) {
                if (cleanDetectedTextNumbersOnly.includes(taxIdToMatch)) {
                    foundTaxId = true;
                } else {
                    isMatch = false;
                }
            }
            
            // 2. เช็คชื่อบริษัท (ยอมให้คลาดเคลื่อนได้นิดหน่อย ต้องเจอคำศัพท์ 80% ขึ้นไป)
            if (companyNameToMatch) {
                if (isFuzzyMatch(companyNameToMatch, detectedText, 0.8)) {
                    foundCompanyName = true;
                } else {
                    isMatch = false;
                }
            }

            // 3. เช็คที่อยู่ (ที่อยู่ยาวมาก โอกาส AI อ่านผิดสูง จึงให้ผ่านถ้าเจอคำศัพท์ 75% ขึ้นไป)
            if (addressToMatch) {
                if (isFuzzyMatch(addressToMatch, detectedText, 0.75)) {
                    foundAddress = true;
                } else {
                    isMatch = false;
                }
            }

            if (!taxIdToMatch && !companyNameToMatch && !addressToMatch) {
                isMatch = false;
            }

            if (!isMatch) {
                let errorDetailsHtml = `
                <div style="margin-top: 15px; background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb; text-align: left; font-size: 14px; line-height: 1.5;">
                    <strong>❌ จุดที่ตรวจสอบไม่พบในเอกสาร:</strong><br>
                    ${(taxIdToMatch && !foundTaxId) ? `• เลขผู้เสียภาษี: <span style="text-decoration: underline;">${taxIdToMatch}</span><br>` : ''}
                    ${(companyNameToMatch && !foundCompanyName) ? `• ชื่อบริษัท: <span style="text-decoration: underline;">${companyNameToMatch}</span><br>` : ''}
                    ${(addressToMatch && !foundAddress) ? `• ที่อยู่: <span style="text-decoration: underline;">${addressToMatch}</span>` : ''}
                </div>`;

                Swal.fire({
                    icon: 'error',
                    title: 'ข้อมูลไม่ตรงกัน!',
                    html: '<div style="font-size: 15px;">เอกสารนี้ไม่ตรงกับฐานข้อมูลที่คุณเลือก</div>' + errorDetailsHtml + amountWarningHtml,
                    confirmButtonColor: '#e74c3c',
                    confirmButtonText: 'รับทราบ'
                });
                submitBtn.disabled = false;
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'ถูกต้องครบถ้วน!',
                    html: '<div style="font-size: 15px;">ข้อมูล ชื่อ, ที่อยู่ และเลขผู้เสียภาษี ตรงกับระบบเรียบร้อยแล้ว</div>' + amountWarningHtml,
                    confirmButtonColor: '#2ecc71',
                    confirmButtonText: 'ตกลง'
                }).then(() => {
                    document.getElementById('cameraInput').value = "";
                    document.getElementById('galleryInput').value = "";
                    document.getElementById('preview').style.display = "none";
                    $('#dataSelect').val(null).trigger('change');
                    currentBase64 = "";
                    submitBtn.disabled = true;
                });
            }

        } catch (error) {
            console.error(error);
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ AI ได้ กรุณาลองใหม่อีกครั้ง', 'error');
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
