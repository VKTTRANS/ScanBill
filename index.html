<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบและสแกนเอกสารด้วย AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a0ca3;
            --secondary: #4cc9f0;
            --bg-color: #f8f9fc;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --border-light: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 25px rgba(67, 97, 238, 0.1);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px 15px; 
            color: var(--text-main); 
        }

        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px 25px; 
            border-radius: 24px; 
            box-shadow: var(--shadow-md); 
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 { 
            color: var(--primary); 
            margin: 0 0 8px 0; 
            font-size: 26px;
            font-weight: 600;
        }

        .header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 15px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            font-weight: 500; 
            color: var(--text-main); 
            display: block; 
            margin-bottom: 10px; 
            font-size: 15px;
        }

        /* ตกแต่ง Dropdown ใหม่ */
        select { 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            font-family: 'Kanit', sans-serif;
            border-radius: 14px; 
            border: 2px solid var(--border-light); 
            background-color: #fcfcfc;
            color: var(--text-main);
            outline: none;
            appearance: none; /* ซ่อนลูกศรเดิม */
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%24%2024%22%20fill%3D%22none%22%20stroke%3D%22%236c757d%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 20px auto;
            transition: all 0.3s ease;
        }
        select:focus { 
            border-color: var(--primary); 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        /* ส่วนแสดงข้อมูล */
        .data-section { 
            margin-bottom: 30px; 
            border: 1px solid var(--border-light); 
            padding: 20px; 
            border-radius: 16px; 
            background-color: #fafbfc; 
            animation: fadeIn 0.4s ease-out;
        }
        
        .data-section h3 {
            margin: 0 0 15px 0; 
            color: var(--text-main); 
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        @media (max-width: 600px) { 
            .info-grid { grid-template-columns: 1fr; } 
            .container { padding: 25px 20px; border-radius: 20px;}
        }

        .info-item label { 
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .info-item span { 
            display: block; 
            padding: 12px 15px; 
            background: #fff; 
            border: 1px solid var(--border-light); 
            border-radius: 10px; 
            font-size: 15px; 
            word-break: break-word; 
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        /* ส่วนอัปโหลดรูปล้ำๆ */
        .upload-section { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #bcccff; 
            padding: 40px 20px; 
            border-radius: 16px; 
            background-color: #f4f7ff; 
            cursor: pointer; 
            margin-bottom: 25px; 
            transition: all 0.3s ease;
        }
        .upload-section:hover {
            border-color: var(--primary);
            background-color: #edf1ff;
        }
        .upload-section:active { 
            transform: scale(0.98);
        }
        .upload-icon {
            color: var(--primary);
            margin-bottom: 15px;
        }
        .upload-text {
            margin: 0; 
            color: var(--primary); 
            font-weight: 500;
            font-size: 16px;
        }
        .upload-subtext {
            margin: 8px 0 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }
        input[type="file"] { display: none; }
        
        #preview { 
            max-width: 100%; 
            max-height: 250px; 
            margin-top: 20px; 
            border-radius: 12px; 
            display: none; 
            box-shadow: var(--shadow-md);
            object-fit: contain;
            animation: fadeIn 0.4s ease-out;
        }

        /* ปุ่มกด Gradient */
        button { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 18px; 
            font-family: 'Kanit', sans-serif;
            border-radius: 14px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 500; 
            transition: all 0.3s; 
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover { 
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled { 
            background: #cbd5e1; 
            box-shadow: none;
            cursor: not-allowed; 
            transform: none;
        }

        .status-msg { 
            text-align: center; 
            font-weight: 500; 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 15px;
            display: none;
            animation: pulse 2s infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ระบบสแกนเอกสารอัจฉริยะ</h2>
        <p>ตรวจสอบความถูกต้องของเอกสารด้วย Google AI</p>
    </div>
    
    <div class="form-group">
        <label for="dataSelect">1. เลือกระเบียนข้อมูลอ้างอิง</label>
        <select id="dataSelect" onchange="displaySelectedData()">
            <option value="">กำลังโหลดข้อมูลจากระบบ...</option>
        </select>
    </div>

    <div class="data-section">
        <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            ข้อมูลในฐานระบบ
        </h3>
        <div id="infoDisplay" class="info-grid">
            <div class="info-item" style="grid-column: 1 / -1; text-align: center; padding: 20px 0;">
                <span style="color:#a0aec0; border: none; background: transparent; box-shadow: none;">กรุณาเลือกรายการด้านบนเพื่อแสดงรายละเอียด</span>
            </div>
        </div>
    </div>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
        </svg>
        <p class="upload-text">แตะเพื่อถ่ายรูป หรือ เลือกไฟล์เอกสาร</p>
        <p class="upload-subtext">รองรับรูปถ่ายจากกล้องมือถือและไฟล์รูปภาพ</p>
        <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="previewFile()">
        <img id="preview" src="" alt="ตัวอย่างรูปถ่าย">
    </div>

    <button id="submitBtn" onclick="processDocument()" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        เริ่มสแกนตรวจสอบ
    </button>
    <div id="status" class="status-msg"></div>
</div>

<script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNJyTVwNaGcfKdF9OTUiXoXxeUJDMjj4t9BAyZfIAedibQPni-xHsL41TACbbOGmL5Xw/exec";
    const VISION_API_KEY = "AIzaSyAUWjUZ43ADkKVCKpefv-d8Fcf20RCCtxw";
    let globalData = [];
    let currentBase64 = "";

    window.onload = function() {
        fetch(`${GAS_WEB_APP_URL}?action=getData&sheetName=Setting`)
        .then(response => response.json())
        .then(res => {
            if(res.status === "success") {
                globalData = res.data;
                const select = document.getElementById("dataSelect");
                select.innerHTML = '<option value="">-- กรุณาเลือกข้อมูล --</option>';
                
                globalData.forEach((item, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    
                    const values = Object.values(item);
                    let displayText = values[0]; 
                    if(values.length > 1 && values[1] !== "") {
                        displayText += " - " + values[1];
                    }
                    
                    option.text = displayText ? displayText : `รายการที่ ${index + 1}`; 
                    select.appendChild(option);
                });
            } else {
                Swal.fire('ข้อผิดพลาด!', 'ไม่สามารถดึงข้อมูลจาก Sheet ได้', 'error');
            }
        }).catch(err => {
            console.error(err);
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว',
                text: 'ไม่สามารถดึงฐานข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ต',
                confirmButtonColor: '#4361ee'
            });
        });
    };

    function displaySelectedData() {
        const selectedIndex = document.getElementById("dataSelect").value;
        const displayDiv = document.getElementById("infoDisplay");
        const submitBtn = document.getElementById("submitBtn");
        
        if(selectedIndex === "") {
            displayDiv.innerHTML = '<div class="info-item" style="grid-column: 1 / -1; text-align: center; padding: 20px 0;"><span style="color:#a0aec0; border: none; background: transparent; box-shadow: none;">กรุณาเลือกรายการด้านบนเพื่อแสดงรายละเอียด</span></div>';
            submitBtn.disabled = true;
            return;
        }

        const selectedItem = globalData[selectedIndex];
        displayDiv.innerHTML = "";
        
        for (const [key, value] of Object.entries(selectedItem)) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "info-item";
            itemDiv.innerHTML = `<label>${key}</label><span>${value || '-'}</span>`;
            displayDiv.appendChild(itemDiv);
        }
        
        // ถ้ารูปมีแล้วและเลือกข้อมูลแล้ว ให้ปลดล็อกปุ่ม
        if (currentBase64 !== "") {
            submitBtn.disabled = false;
        }
    }

    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById("submitBtn");
        const selectedIndex = document.getElementById("dataSelect").value;
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "block";
            currentBase64 = reader.result.split(',')[1];
            
            // ถ้ารูปมีแล้วและเลือกข้อมูลแล้ว ให้ปลดล็อกปุ่ม
            if (selectedIndex !== "") {
                submitBtn.disabled = false;
            }
        }

        if (file) {
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            preview.style.display = "none";
            currentBase64 = "";
            submitBtn.disabled = true;
        }
    }

    function updateStatus(message, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = message;
        
        if(type === "loading") {
            statusDiv.style.display = "block";
            statusDiv.style.backgroundColor = "#fff8e1";
            statusDiv.style.color = "#f57c00";
            statusDiv.style.border = "1px solid #ffe0b2";
        } else {
            statusDiv.style.display = "none";
        }
    }

    async function processDocument() {
        const fileInput = document.getElementById('fileInput');
        const selectedIndex = document.getElementById("dataSelect").value;
        const submitBtn = document.getElementById("submitBtn");
        
        if (fileInput.files.length === 0 || !currentBase64) {
            Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาถ่ายรูปหรืออัปโหลดเอกสารก่อนสแกน', confirmButtonColor: '#4361ee' });
            return;
        }
        if (selectedIndex === "") {
            Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาเลือกระเบียนข้อมูลที่ต้องการตรวจสอบก่อน', confirmButtonColor: '#4361ee' });
            return;
        }

        const selectedItem = globalData[selectedIndex];
        const taxIdToMatch = selectedItem["TaxID"] ? selectedItem["TaxID"].toString().replace(/\D/g,'') : "";
        
        submitBtn.disabled = true;
        
        // ใช้ SweetAlert แบบแสดงสถานะโหลด
        Swal.fire({
            title: 'AI กำลังวิเคราะห์รูปภาพ...',
            html: 'กรุณารอสักครู่ ระบบกำลังแยกแยะตัวอักษร',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading()
            }
        });

        const visionPayload = {
            requests: [
                {
                    image: { content: currentBase64 },
                    features: [{ type: "TEXT_DETECTION" }]
                }
            ]
        };

        try {
            const visionResponse = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(visionPayload)
            });

            const visionData = await visionResponse.json();
            
            if (visionData.responses[0].error) {
                Swal.fire('ข้อผิดพลาด AI', visionData.responses[0].error.message, 'error');
                submitBtn.disabled = false;
                return;
            }

            const detectedText = visionData.responses[0].fullTextAnnotation ? visionData.responses[0].fullTextAnnotation.text : "";
            const cleanDetectedText = detectedText.replace(/\D/g, '');

            let isMatch = false;
            
            // ตรวจสอบ TaxID (แม่นยำที่สุด)
            if (taxIdToMatch && cleanDetectedText.includes(taxIdToMatch)) {
                isMatch = true;
            } else {
                // ถ้าไม่มี TaxID ให้ลองเทียบจากชื่อ
                const companyName = selectedItem["CompanyName"] ? selectedItem["CompanyName"].toString().toLowerCase().replace(/\s/g, '') : "";
                const cleanTextLower = detectedText.toLowerCase().replace(/\s/g, '');
                if (companyName && cleanTextLower.includes(companyName)) {
                    isMatch = true;
                }
            }

            if (!isMatch) {
                Swal.fire({
                    icon: 'error',
                    title: 'ข้อมูลไม่ตรงกัน!',
                    text: 'ตรวจพบว่าข้อมูลบนเอกสาร ไม่ตรง กับฐานข้อมูลในระบบ กรุณาตรวจสอบอีกครั้ง',
                    confirmButtonColor: '#e74c3c',
                    confirmButtonText: 'รับทราบ'
                });
                submitBtn.disabled = false;
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'ถูกต้องครบถ้วน!',
                    text: 'ข้อมูลบนเอกสารตรงกับระบบ',
                    confirmButtonColor: '#2ecc71',
                    confirmButtonText: 'ตกลง',
                    timer: 3000
                }).then(() => {
                    // รีเซ็ตหน้าจอเพื่อพร้อมสำหรับสแกนใบถัดไป
                    fileInput.value = "";
                    document.getElementById('preview').style.display = "none";
                    document.getElementById("dataSelect").value = "";
                    displaySelectedData();
                    currentBase64 = "";
                    submitBtn.disabled = true;
                });
            }

        } catch (error) {
            console.error(error);
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ AI ได้ กรุณาลองใหม่อีกครั้ง', 'error');
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
