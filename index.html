<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลและอัปโหลดเอกสาร</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .data-section {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
        }
        .info-item label {
            font-weight: bold;
            color: #7f8c8d;
            display: block;
            margin-bottom: 5px;
        }
        .info-item span {
            display: block;
            padding: 10px;
            background: #fff;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            font-size: 16px;
        }
        .upload-section {
            text-align: center;
            border: 2px dashed #3498db;
            padding: 30px;
            border-radius: 8px;
            background-color: #ecf0f1;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-section:hover {
            background-color: #e2e8f0;
        }
        input[type="file"] {
            display: none;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 15px;
            border-radius: 6px;
            display: none;
        }
        .selector-box {
            margin-bottom: 20px;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .status-msg {
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ระบบตรวจสอบข้อมูลพนักงานและอัปโหลดเอกสาร</h2>
    
    <div class="selector-box">
        <label for="dataSelect" style="font-weight:bold; display:block; margin-bottom:8px;">เลือกข้อมูลที่ต้องการตรวจสอบ:</label>
        <select id="dataSelect" onchange="displaySelectedData()">
            <option value="">-- กำลังโหลดข้อมูลจาก Google Sheet --</option>
        </select>
    </div>

    <div class="data-section">
        <h3 style="margin-top:0; color:#34495e;">ข้อมูลในระบบ (ห้ามแก้ไข)</h3>
        <div id="infoDisplay" class="info-grid">
            <div class="info-item"><span style="color:#95a5a6; text-align:center;">กรุณาเลือกรายการด้านบนเพื่อเปิดดูข้อมูล</span></div>
        </div>
    </div>

    <h3 style="color:#34495e;">ถ่ายรูปหรือแนบเอกสารเพื่อยืนยัน</h3>
    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p style="margin:0; color:#2980b9; font-weight:bold;">📷 คลิกเพื่อเปิดกล้องถ่ายรูป หรือ เลือกไฟล์เอกสาร</p>
        <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="previewFile()">
        <img id="preview" src="" alt="ตัวอย่างรูปถ่าย">
    </div>

    <button id="submitBtn" onclick="uploadData()" disabled>ยืนยันข้อมูลถูกต้องและส่งเอกสาร</button>
    <div id="status" class="status-msg"></div>
</div>

<script>
    // สตรีมลิงก์ Web App จาก Google Apps Script ของคุณ
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNJyTVwNaGcfKdF9OTUiXoXxeUJDMjj4t9BAyZfIAedibQPni-xHsL41TACbbOGmL5Xw/exec";
    
    let globalData = [];

    // โหลดข้อมูลจาก Google Sheet เมื่อเปิดหน้าเว็บ
    window.onload = function() {
        fetch(`${GAS_WEB_APP_URL}?action=getData`)
        .then(response => response.json())
        .then(res => {
            if(res.status === "success") {
                globalData = res.data;
                const select = document.getElementById("dataSelect");
                select.innerHTML = '<option value="">-- เลือกรายการข้อมูล --</option>';
                
                // สมมติว่าคอลัมน์แรกใน Sheet เป็น "ชื่อ" หรือ ID ให้ใช้แสดงในตัวเลือก
                globalData.forEach((item, index) => {
                    const firstKey = Object.keys(item)[0]; 
                    const option = document.createElement("option");
                    option.value = index;
                    option.text = item[firstKey] || `รายการที่ ${index + 1}`;
                    select.appendChild(option);
                });
            } else {
                alert("ไม่สามารถดึงข้อมูลจาก Sheet ได้: " + res.message);
            }
        }).catch(err => {
            console.error(err);
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบ");
        });
    };

    // แสดงข้อมูลในหน้าจอ (ดึงมาโชว์เฉยๆ พนักงานพิมพ์แก้ไขไม่ได้)
    function displaySelectedData() {
        const selectedIndex = document.getElementById("dataSelect").value;
        const displayDiv = document.getElementById("infoDisplay");
        
        if(selectedIndex === "") {
            displayDiv.innerHTML = '<div class="info-item"><span style="color:#95a5a6;">กรุณาเลือกรายการด้านบนเพื่อเปิดดูข้อมูล</span></div>';
            document.getElementById("submitBtn").disabled = true;
            return;
        }

        const selectedItem = globalData[selectedIndex];
        displayDiv.innerHTML = "";
        
        // วนลูปแสดงผลทุกคอลัมน์ที่มีใน Google Sheet ตัวนั้นๆ
        for (const [key, value] of Object.entries(selectedItem)) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "info-item";
            itemDiv.innerHTML = `<label>${key}</label><span>${value}</span>`;
            displayDiv.appendChild(itemDiv);
        }
        document.getElementById("submitBtn").disabled = false;
    }

    // ฟังก์ชันแสดงตัวอย่างภาพเมื่อพนักงานถ่ายรูป
    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('preview');
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "inline-block";
        }

        if (file) {
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            preview.style.display = "none";
        }
    }

    // ฟังก์ชันส่งภาพอัปโหลดไปยัง Google Drive
    function uploadData() {
        const fileInput = document.getElementById('fileInput');
        const selectedIndex = document.getElementById("dataSelect").value;
        const statusDiv = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            alert("กรุณาถ่ายรูปหรืออัปโหลดเอกสารก่อนส่ง");
            return;
        }

        if (selectedIndex === "") {
            alert("กรุณาเลือกข้อมูลเพื่อตรวจสอบก่อน");
            return;
        }

        statusDiv.style.color = "orange";
        statusDiv.innerText = "⏳ กำลังอัปโหลดและประมวลผลข้อมูล กรุณารอสักครู่...";
        document.getElementById("submitBtn").disabled = true;

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const base64Str = e.target.result.split(',')[1];
            
            const payload = {
                file: base64Str,
                filename: file.name,
                mimeType: file.type,
                checkInfo: globalData[selectedIndex] // แนบข้อมูลที่ตรวจสอบไปด้วย
            };

            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(result => {
                if(result.status === "success") {
                    statusDiv.style.color = "green";
                    statusDiv.innerText = "✅ " + result.message;
                    alert("ตรวจสอบข้อมูลและส่งไฟล์เรียบร้อยแล้ว!");
                    //รีเซ็ตหน้าจอหลังทำงานเสร็จ
                    fileInput.value = "";
                    document.getElementById('preview').style.display = "none";
                    document.getElementById("dataSelect").value = "";
                    displaySelectedData();
                } else {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "❌ เกิดข้อผิดพลาด: " + result.message;
                    document.getElementById("submitBtn").disabled = false;
                }
            })
            .catch(err => {
                statusDiv.style.color = "red";
                statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการส่งข้อมูล";
                document.getElementById("submitBtn").disabled = false;
                console.error(err);
            });
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
