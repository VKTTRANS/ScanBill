<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบและสแกนเอกสารด้วย AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .data-section { margin-bottom: 30px; border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; background-color: #fafafa; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
        .info-item label { font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; }
        .info-item span { display: block; padding: 10px; background: #fff; border: 1px solid #dcdde1; border-radius: 6px; font-size: 16px; word-break: break-word; }
        .upload-section { text-align: center; border: 2px dashed #3498db; padding: 30px; border-radius: 8px; background-color: #ecf0f1; cursor: pointer; margin-bottom: 20px; }
        .upload-section:hover { background-color: #e2e8f0; }
        input[type="file"] { display: none; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #preview { max-width: 100%; max-height: 300px; margin-top: 15px; border-radius: 6px; display: none; }
        .selector-box { margin-bottom: 20px; }
        select { width: 100%; padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ระบบสแกนตรวจสอบเอกสารอัตโนมัติ</h2>
    
    <div class="selector-box">
        <label for="dataSelect" style="font-weight:bold; display:block; margin-bottom:8px;">เลือกข้อมูลที่ต้องการตรวจสอบ:</label>
        <select id="dataSelect" onchange="displaySelectedData()">
            <option value="">-- กำลังโหลดข้อมูล --</option>
        </select>
    </div>

    <div class="data-section">
        <h3 style="margin-top:0; color:#34495e;">ข้อมูลอ้างอิงจากระบบ</h3>
        <div id="infoDisplay" class="info-grid">
            <div class="info-item"><span style="color:#95a5a6; text-align:center;">กรุณาเลือกรายการด้านบน</span></div>
        </div>
    </div>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p style="margin:0; color:#2980b9; font-weight:bold;">📷 ถ่ายรูปหรือแนบเอกสารเพื่อสแกนด้วย AI</p>
        <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="previewFile()">
        <img id="preview" src="" alt="ตัวอย่างรูปถ่าย">
    </div>

    <button id="submitBtn" onclick="processDocument()" disabled>สแกนและตรวจสอบข้อมูล</button>
    <div id="status" class="status-msg"></div>
</div>

<script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNJyTVwNaGcfKdF9OTUiXoXxeUJDMjj4t9BAyZfIAedibQPni-xHsL41TACbbOGmL5Xw/exec";
    const VISION_API_KEY = "AIzaSyAUWjUZ43ADkKVCKpefv-d8Fcf20RCCtxw";
    let globalData = [];
    let currentBase64 = "";

    window.onload = function() {
        fetch(`${GAS_WEB_APP_URL}?action=getData&sheetName=Setting`)
        .then(response => response.json())
        .then(res => {
            if(res.status === "success") {
                globalData = res.data;
                const select = document.getElementById("dataSelect");
                select.innerHTML = '<option value="">-- เลือกรายการที่ต้องการตรวจสอบ --</option>';
                
                globalData.forEach((item, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    
                    const values = Object.values(item);
                    let displayText = values[0]; 
                    if(values.length > 1 && values[1] !== "") {
                        displayText += " - " + values[1];
                    }
                    
                    option.text = displayText ? displayText : `รายการที่ ${index + 1}`; 
                    select.appendChild(option);
                });
            } else {
                alert("ไม่สามารถดึงข้อมูลจาก Sheet ได้: " + res.message);
            }
        }).catch(err => {
            console.error(err);
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบฐานข้อมูล");
        });
    };

    function displaySelectedData() {
        const selectedIndex = document.getElementById("dataSelect").value;
        const displayDiv = document.getElementById("infoDisplay");
        const submitBtn = document.getElementById("submitBtn");
        
        if(selectedIndex === "") {
            displayDiv.innerHTML = '<div class="info-item"><span style="color:#95a5a6; text-align:center;">กรุณาเลือกรายการด้านบน</span></div>';
            submitBtn.disabled = true;
            return;
        }

        const selectedItem = globalData[selectedIndex];
        displayDiv.innerHTML = "";
        
        for (const [key, value] of Object.entries(selectedItem)) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "info-item";
            itemDiv.innerHTML = `<label>${key}</label><span>${value || '-'}</span>`;
            displayDiv.appendChild(itemDiv);
        }
        submitBtn.disabled = false;
    }

    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('preview');
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "inline-block";
            currentBase64 = reader.result.split(',')[1];
        }

        if (file) {
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            preview.style.display = "none";
            currentBase64 = "";
        }
    }

    function updateStatus(message, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = message;
        if(type === "loading") {
            statusDiv.style.backgroundColor = "#fff3cd";
            statusDiv.style.color = "#856404";
            statusDiv.style.border = "1px solid #ffeeba";
        } else if(type === "success") {
            statusDiv.style.backgroundColor = "#d4edda";
            statusDiv.style.color = "#155724";
            statusDiv.style.border = "1px solid #c3e6cb";
        } else if(type === "error") {
            statusDiv.style.backgroundColor = "#f8d7da";
            statusDiv.style.color = "#721c24";
            statusDiv.style.border = "1px solid #f5c6cb";
        } else {
            statusDiv.style.backgroundColor = "transparent";
            statusDiv.style.color = "#333";
            statusDiv.style.border = "none";
        }
    }

    async function processDocument() {
        const fileInput = document.getElementById('fileInput');
        const selectedIndex = document.getElementById("dataSelect").value;
        const submitBtn = document.getElementById("submitBtn");
        
        if (fileInput.files.length === 0 || !currentBase64) {
            alert("กรุณาถ่ายรูปหรืออัปโหลดเอกสารก่อนส่ง");
            return;
        }
        if (selectedIndex === "") {
            alert("กรุณาเลือกข้อมูลเพื่อตรวจสอบก่อน");
            return;
        }

        const selectedItem = globalData[selectedIndex];
        
        // ดึงเฉพาะตัวเลขจาก TaxID ถ้ามี
        const taxIdToMatch = selectedItem["TaxID"] ? selectedItem["TaxID"].toString().replace(/\D/g,'') : "";
        
        submitBtn.disabled = true;
        updateStatus("⏳ AI กำลังสแกนอ่านข้อความในรูปภาพ...", "loading");

        const visionPayload = {
            requests: [
                {
                    image: { content: currentBase64 },
                    features: [{ type: "TEXT_DETECTION" }]
                }
            ]
        };

        try {
            const visionResponse = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(visionPayload)
            });

            const visionData = await visionResponse.json();
            
            if (visionData.responses[0].error) {
                updateStatus("❌ AI ไม่สามารถอ่านรูปภาพนี้ได้", "error");
                alert("ข้อผิดพลาด: " + visionData.responses[0].error.message);
                submitBtn.disabled = false;
                return;
            }

            const detectedText = visionData.responses[0].fullTextAnnotation ? visionData.responses[0].fullTextAnnotation.text : "";
            const cleanDetectedText = detectedText.replace(/\D/g, ''); // เอาเฉพาะตัวเลขจากข้อความที่สแกนได้

            let isMatch = false;
            
            // 1. ตรวจสอบจากเลข TaxID ก่อน (แม่นยำที่สุด)
            if (taxIdToMatch && cleanDetectedText.includes(taxIdToMatch)) {
                isMatch = true;
            } else {
                // 2. ถ้า TaxID ไม่ตรง ลองตรวจสอบจากชื่อบริษัท (ตัดช่องว่างและทำตัวเล็กทั้งหมด)
                const companyName = selectedItem["CompanyName"] ? selectedItem["CompanyName"].toString().toLowerCase().replace(/\s/g, '') : "";
                const cleanTextLower = detectedText.toLowerCase().replace(/\s/g, '');
                
                if (companyName && cleanTextLower.includes(companyName)) {
                    isMatch = true;
                }
            }

            // แสดงผลลัพธ์
            if (!isMatch) {
                updateStatus("❌ ข้อมูลในรูปภาพ ไม่ตรง กับฐานข้อมูล", "error");
                alert("⚠️ AI ตรวจสอบแล้วพบว่า ข้อมูลบนเอกสาร ไม่ตรง กับฐานข้อมูลที่เลือก กรุณาตรวจสอบอีกครั้ง!");
                submitBtn.disabled = false;
            } else {
                updateStatus("✅ ข้อมูลถูกต้องตรงกัน!", "success");
                alert("🎉 ข้อมูลถูกต้อง! เอกสารนี้ตรงกับฐานข้อมูลในระบบครับ");
                
                // รีเซ็ตหน้าจอเตรียมสแกนใบถัดไป
                setTimeout(() => {
                    fileInput.value = "";
                    document.getElementById('preview').style.display = "none";
                    document.getElementById("dataSelect").value = "";
                    displaySelectedData();
                    updateStatus("", "");
                    submitBtn.disabled = false;
                }, 2000);
            }

        } catch (error) {
            console.error(error);
            updateStatus("❌ เกิดข้อผิดพลาดในการเชื่อมต่อระบบ", "error");
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
