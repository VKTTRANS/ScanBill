<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจสอบและสแกนเอกสารด้วย AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a0ca3;
            --bg-color: #f8f9fc;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --border-light: #e2e8f0;
            --shadow-md: 0 10px 25px rgba(67, 97, 238, 0.1);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 15px; color: var(--text-main); 
        }

        .container { 
            max-width: 600px; margin: 0 auto; background: var(--card-bg); 
            padding: 25px 20px; border-radius: 16px; box-shadow: var(--shadow-md); 
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--primary); margin: 0 0 5px 0; font-size: 22px; }
        
        .upload-container {
            border: 2px dashed #bcccff; padding: 20px; border-radius: 12px; 
            background-color: #f4f7ff; margin-bottom: 20px; text-align: center;
        }

        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;}
        .action-btn {
            background-color: white; border: 1px solid var(--primary); color: var(--primary);
            padding: 10px; border-radius: 10px; cursor: pointer; display: flex;
            flex-direction: column; align-items: center; gap: 5px; font-size: 14px; font-weight: 500;
        }
        .action-btn:hover { background-color: var(--primary); color: white; }
        
        #previewContainer { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .preview-img { max-height: 100px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .submit-btn { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white; border: none; padding: 15px; font-size: 16px; font-family: inherit;
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* SweetAlert Customization */
        .swal2-popup { font-family: 'Kanit', sans-serif !important; }
        .custom-alert-box { 
            background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; 
            padding: 15px; margin-top: 15px; text-align: left; font-size: 14px;
        }
        .highlight-error { color: #e74c3c; font-weight: bold; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ระบบ AI สแกนเอกสาร</h2>
        <p style="color: var(--text-muted); font-size: 14px;">ตรวจสอบความถูกต้องของเอกสารอัตโนมัติ</p>
    </div>

    <div class="upload-container">
        <div class="action-buttons">
            <div class="action-btn" onclick="document.getElementById('cameraInput').click()">
                📸 ถ่ายรูปใหม่
            </div>
            <div class="action-btn" onclick="document.getElementById('galleryInput').click()">
                🖼️ อัปโหลดรูป
            </div>
        </div>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFiles(this)">
        <input type="file" id="galleryInput" accept="image/*" multiple onchange="handleFiles(this)">
        <div id="previewContainer"></div>
    </div>

    <button id="submitBtn" class="submit-btn" onclick="startScan()" disabled>
        🔍 เริ่มสแกนตรวจสอบ
    </button>
</div>

<script>
    // --- ตั้งค่าระบบ ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxNJyTVwNaGcfKdF9OTUiXoXxeUJDMjj4t9BAyZfIAedibQPni-xHsL41TACbbOGmL5Xw/exec";
    const VISION_API_KEY = "AIzaSyAUWjUZ43ADkKVCKpefv-d8Fcf20RCCtxw"; // ⚠️ ควรย้ายไปไว้ฝั่ง Backend ในอนาคต
    
    let dbData = [];
    let select2Options = [];
    let imageBase64List = [];

    // --- เริ่มต้นโหลดข้อมูล ---
    window.onload = async () => {
        Swal.fire({ title: 'กำลังดึงฐานข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch(`${GAS_URL}?action=getData&sheetName=Setting`);
            const json = await res.json();
            if(json.status === "success") {
                dbData = json.data;
                select2Options = dbData.map((item, idx) => ({ id: idx, text: item["CompanyName"] || `บริษัทที่ ${idx + 1}` }));
                select2Options.unshift({ id: '', text: '' }); // Placeholder
                Swal.close();
            }
        } catch (err) {
            Swal.fire('ผิดพลาด', 'ดึงฐานข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้าเว็บ', 'error');
        }
    };

    // --- จัดการไฟล์รูปภาพ ---
    function handleFiles(input) {
        const preview = document.getElementById('previewContainer');
        preview.innerHTML = ""; 
        imageBase64List = [];

        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-img';
                preview.appendChild(img);
                imageBase64List.push(e.target.result.split(',')[1]);
                document.getElementById("submitBtn").disabled = imageBase64List.length === 0;
            };
            reader.readAsDataURL(file);
        });
    }

    // --- เริ่มสแกน Vision API ---
    async function startScan() {
        document.getElementById("submitBtn").disabled = true;
        Swal.fire({ title: 'AI กำลังวิเคราะห์...', text: 'กรุณารอสักครู่', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const requests = imageBase64List.map(base64 => ({
                image: { content: base64 },
                features: [{ type: "TEXT_DETECTION" }]
            }));

            const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                method: 'POST', body: JSON.stringify({ requests })
            });
            const visionResult = await res.json();
            
            // นำ Text จากทุกรูปมารวมกัน
            const fullText = visionResult.responses
                .map(r => r.fullTextAnnotation ? r.fullTextAnnotation.text : "")
                .join("\n");

            analyzeExtractedText(fullText);

        } catch (err) {
            Swal.fire('ผิดพลาด', 'ระบบ AI ขัดข้อง กรุณาลองใหม่', 'error');
            document.getElementById("submitBtn").disabled = false;
        }
    }

    // --- ประมวลผลและค้นหา ---
    function analyzeExtractedText(ocrText) {
        const numbersOnly = ocrText.replace(/\D/g, '');
        let matchedIndexes = [];

        // หาเลข 13 หลัก
        dbData.forEach((item, idx) => {
            const taxId = (item["TaxID"] || "").toString().replace(/\D/g, '');
            if (taxId.length >= 10 && numbersOnly.includes(taxId)) {
                matchedIndexes.push(idx);
            }
        });

        if (matchedIndexes.length === 0) {
            promptManualSelect(ocrText);
        } else if (matchedIndexes.length === 1) {
            evaluateCompany(dbData[matchedIndexes[0]], ocrText);
        } else {
            // กรณีเจอหลายสาขา (ดึงตัวแรกมาเช็คก่อน หรือทำ UI ให้เลือกสาขาเพิ่มได้ที่นี่)
            evaluateCompany(dbData[matchedIndexes[0]], ocrText);
        }
    }

    // --- ให้ผู้ใช้เลือกเองกรณีหา TaxID ไม่เจอ ---
    function promptManualSelect(ocrText) {
        Swal.fire({
            icon: 'warning',
            title: 'สแกนไม่พบเลขผู้เสียภาษี',
            html: '<div style="margin-bottom:10px;">กรุณาเลือกบริษัทด้วยตนเอง</div><select id="companySelect" style="width:100%"></select>',
            showCancelButton: true, confirmButtonText: 'ตกลง', cancelButtonText: 'ยกเลิก',
            didOpen: () => {
                $('#companySelect').select2({ data: select2Options, placeholder: "พิมพ์ค้นหาชื่อบริษัท..." });
            },
            preConfirm: () => {
                const val = $('#companySelect').val();
                if (!val) { Swal.showValidationMessage('กรุณาเลือกบริษัท'); return false; }
                return val;
            }
        }).then(result => {
            if (result.isConfirmed) evaluateCompany(dbData[result.value], ocrText);
            else document.getElementById("submitBtn").disabled = false;
        });
    }

    // --- ตรวจสอบความถูกต้องและแสดงผล ---
    function evaluateCompany(company, ocrText) {
        // หาจำนวนเงินสูงสุด
        const amounts = ocrText.match(/\b\d{1,3}(?:,\d{3})+(?:\.\d{2})?\b|\b\d+\.\d{2}\b/g) || [];
        const maxAmount = amounts.reduce((max, val) => Math.max(max, parseFloat(val.replace(/,/g, ''))), 0);

        // Normalize Text สำหรับเทียบ (ลบช่องว่างทิ้งทั้งหมดเพื่อให้แม่นยำขึ้นเวลา OCR เว้นวรรคผิด)
        const cleanOcr = ocrText.replace(/\s+/g, '');
        const dbName = (company["CompanyName"] || "").replace(/\s+/g, '');
        const dbAddress = (company["Address"] || "").replace(/\s+/g, '');

        let isNameMatch = dbName && cleanOcr.includes(dbName);
        let isAddressMatch = dbAddress && cleanOcr.includes(dbAddress);

        // สร้าง HTML สำหรับแสดงผล
        let resultHtml = `
            <div class="custom-alert-box" style="text-align: center;">
                <b style="color: var(--primary); font-size: 16px;">${company["CompanyName"]}</b>
            </div>`;

        if (!isNameMatch || !isAddressMatch) {
            resultHtml += `<div class="custom-alert-box">
                <b style="color:#e74c3c;">⚠️ พบจุดที่อาจไม่ตรงกับระบบ:</b><br><br>
                ${!isNameMatch ? `<b>ชื่อบริษัท:</b> ตรวจไม่พบชื่อที่ตรงกันเป๊ะในใบเสร็จ<br>` : ''}
                ${!isAddressMatch ? `<b>ที่อยู่:</b> ตรวจไม่พบที่อยู่ที่ตรงกันเป๊ะในใบเสร็จ` : ''}
                <div style="font-size:12px; color:#7f8c8d; margin-top:10px;">*รูปอาจไม่ชัด หรือ OCR อ่านเว้นวรรคผิดเพี้ยน</div>
            </div>`;
        }

        if (maxAmount >= 1070) {
            resultHtml += `<div class="custom-alert-box" style="background:#fff3cd; border-color:#ffeeba;">
                <b style="color:#d35400;">💰 ยอดเงินสูงสุดที่พบ: ${maxAmount.toLocaleString()} บาท</b><br>
                <span style="font-size: 13px;">(ยอดเกิน 1,070 บาท กรุณาตรวจสอบการหัก ณ ที่จ่าย)</span>
            </div>`;
        }

        const isPerfectMatch = isNameMatch && isAddressMatch;

        Swal.fire({
            icon: isPerfectMatch ? 'success' : 'warning',
            title: isPerfectMatch ? 'ข้อมูลถูกต้อง!' : 'โปรดตรวจสอบอีกครั้ง',
            html: resultHtml,
            confirmButtonText: 'เสร็จสิ้น',
            confirmButtonColor: isPerfectMatch ? '#2ecc71' : '#e67e22'
        }).then(() => {
            // Reset ฟอร์ม
            document.getElementById('cameraInput').value = "";
            document.getElementById('galleryInput').value = "";
            document.getElementById('previewContainer').innerHTML = "";
            imageBase64List = [];
            document.getElementById("submitBtn").disabled = true;
        });
    }
</script>

</body>
</html>
